version: "3.9"
services:

  rosbot:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_LOCALHOST_ONLY=0
    volumes:
      - ./config/oak_1080p.yaml:/config/oak_1080p.yaml:ro
      - ./config/ekf_internal_off.yaml:/ros2_ws/install/rosbot_xl_bringup/share/rosbot_xl_bringup/config/ekf.yaml:ro
    command: >
      bash -lc '
        # OJO: no -euo pipefail => más tolerante a fallos transitorios
        source /opt/ros/humble/setup.bash;

        # 1) Bringup
        ros2 launch rosbot_xl_bringup bringup.launch.py \
          mecanum:=${MECANUM:-True} \
          depthai_params_file:=/config/oak_1080p.yaml &
        BRINGUP_PID=$!

        # 2) (Opcional) espera a controller_manager
        for i in $(seq 1 60); do
          ros2 service list | grep -q "/controller_manager/switch_controller" && break
          sleep 0.5
        done

        # 3) NO desactivar la TF del base_controller aquí (Teleop la necesita)
        #    El EKF interno ya tiene publish_tf=false vía ekf_internal_off.yaml

        # 4) Espera robusta a /odom (sin matar el shell si falla)
        echo "[rosbot] esperando publisher /rosbot_xl_base_controller/odom…"
        for i in $(seq 1 200); do
          P=$(( (ros2 topic info /rosbot_xl_base_controller/odom 2>/dev/null | awk "/Publisher count:/ {print \$3}") || echo 0 ))
          [ "${P:-0}" -ge 1 ] && echo "[rosbot] ODOM publisher OK" && break
          sleep 0.5
        done

        # 5) Mantener el proceso
        wait $${BRINGUP_PID}
      '
    healthcheck:
      test: ["CMD-SHELL",
             "bash -lc 'source /opt/ros/humble/setup.bash && \\
                        ros2 topic info /rosbot_xl_base_controller/odom 2>/dev/null | \\
                        grep -q \"Publisher count: 1\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  localization:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    container_name: rosbot-localization
    depends_on:
      - rosbot
    network_mode: host
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    init: true
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ./config/ekf_odom.yaml:/config/ekf_odom.yaml:ro
      - ./scripts/localization_entrypoint.sh:/entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL","bash -lc 'source /opt/ros/humble/setup.bash && ros2 node list | grep -q ^/localization/ekf_filter_node$'"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  microros:
    image: husarion/micro-ros-agent:humble-3.1.3-20240126
    restart: unless-stopped
    ports:
      - 8888:8888/udp
    command: ros2 run micro_ros_agent micro_ros_agent udp4 --port 8888

  rplidar:
    image: husarion/rplidar:humble-1.0.1-20240104
    restart: unless-stopped
    devices:
      - ${RPLIDAR_BYID:-/dev/ttyUSB0}:/dev/rplidar
    command: >
      ros2 launch /husarion_utils/rplidar.launch.py
        serial_port:=${RPLIDAR_PORT:-/dev/rplidar}
        serial_baudrate:=${LIDAR_BAUDRATE:-1000000}
    environment: [ ROS_DOMAIN_ID=0 ]
    healthcheck:
      test: ["CMD-SHELL",
             "bash -c 'source /opt/ros/humble/setup.bash && ros2 topic list | grep -q ^/scan$'"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 10

  navigation:
    image: husarion/navigation2:humble-1.1.12-20240123
    restart: unless-stopped
    depends_on:
      rplidar: { condition: service_started }
      rosbot:  { condition: service_started }
    volumes:
      - ./config/nav2_${CONTROLLER:-rpp}_params.yaml:/params.yaml
      - ./maps:/maps
      - ./scripts:/ros2_ws/scripts:ro
    environment:
      - MAP=${MAP:-r1}
    command: >
      ros2 launch /husarion_utils/bringup_launch.py
        slam:=${SLAM:-True}
        params_file:=/params.yaml
        map:=/maps/${MAP:-r1}.yaml
        use_sim_time:=False

  path_tools:
    image: husarion/navigation2:humble-1.1.12-20240123
    network_mode: host
    restart: unless-stopped
    environment: [ ROS_DOMAIN_ID=0 ]
    volumes:
      - ./routes:/routes
      - ./scripts:/scripts:ro
    # load the ROS environment before idling
    command: bash -c "source /opt/ros/humble/setup.bash && sleep infinity"
    depends_on:
      navigation: { condition: service_started }

  foxglove:
    image: husarion/foxglove:1.84.0
    restart: unless-stopped
    ports:
      - 8080:8080
      - 8765:8765
    volumes:
      - ./config/layout.json:/foxglove/default-layout.json
    environment:
      - DS_TYPE=foxglove-websocket
      - DS_PORT=8765
      - DS_HOST=foxglove-ds
      - UI_PORT=8080
      - DISABLE_CACHE=true
      - DISABLE_INTERACTION=false

  foxglove-ds:
    image: husarion/foxglove-bridge:humble-0.7.3-20240108
    restart: unless-stopped
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml
        port:=8765
        capabilities:=[clientPublish,connectionGraph,assets]
    depends_on:
      rplidar:
        condition: service_started

  explore_lite:
    build:
      context: .
      dockerfile: Dockerfile.explore_lite
    network_mode: host
    restart: unless-stopped
    profiles: ["explore"]
    volumes:
      - ./config/explore_params.yaml:/opt/explore_ws/explore_params.yaml:ro
    depends_on:
      navigation:
        condition: service_healthy

