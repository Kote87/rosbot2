x-nav2-image: &nav2-image
  build:
    context: .
    dockerfile: Dockerfile.navigation
    args:
      NAV2_BRANCH: humble
  image: rosbot-navigation2:humble-source

services:

  rosbot:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    restart: unless-stopped
    environment: [ ROS_DOMAIN_ID=0 ]
    volumes:
      - ./config/oak_1080p.yaml:/config/oak_1080p.yaml:ro
    command: >
      ros2 launch rosbot_xl_bringup bringup.launch.py
        mecanum:=${MECANUM:-True}
        depthai_params_file:=/config/oak_1080p.yaml

  microros:
    image: husarion/micro-ros-agent:humble-3.1.3-20240126
    restart: unless-stopped
    ports:
      - 8888:8888/udp
    command: ros2 run micro_ros_agent micro_ros_agent udp4 --port 8888

  rplidar:
    image: husarion/rplidar:humble-1.0.1-20240104
    restart: unless-stopped
    devices:
      - ${RPLIDAR_BYID:-/dev/ttyUSB0}:/dev/rplidar
    command: >
      ros2 launch /husarion_utils/rplidar.launch.py
        serial_port:=${RPLIDAR_PORT:-/dev/rplidar}
        serial_baudrate:=${LIDAR_BAUDRATE:-1000000}
    environment: [ ROS_DOMAIN_ID=0 ]
    healthcheck:
      test: ["CMD-SHELL",
             "bash -c 'source /opt/ros/humble/setup.bash && ros2 topic list | grep -q ^/scan$'"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 10

  scan_filter:
    build:
      context: .
      dockerfile: Dockerfile.scan_filter
    network_mode: host
    restart: unless-stopped
    environment: [ ROS_DOMAIN_ID=0 ]
    volumes:
      - ./config/laser_filters.yaml:/config/laser_filters.yaml:ro
    depends_on:
      - rplidar

  navigation:
    <<: *nav2-image
    restart: unless-stopped
    depends_on:
      rplidar: { condition: service_started }
      rosbot:  { condition: service_started }
    volumes:
      - ./config/nav2_${CONTROLLER:-rpp}_params.yaml:/params.yaml
      - ./maps:/maps
      - ./scripts:/ros2_ws/scripts:ro
    environment:
      - MAP=${MAP:-r1}
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        source ${NAV2_OVERLAY_SETUP:-/navigation2_ws/install/setup.bash} &&
        ros2 launch /husarion_utils/bringup_launch.py \
          slam:=${SLAM:-True} \
          params_file:=/params.yaml \
          map:=/maps/${MAP:-r1}.yaml \
          use_sim_time:=False"

  path_tools:
    <<: *nav2-image
    network_mode: host
    restart: unless-stopped
    environment: [ ROS_DOMAIN_ID=0 ]
    volumes:
      - ./routes:/routes
      - ./scripts:/scripts:ro
    # load the ROS environment before idling
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        source ${NAV2_OVERLAY_SETUP:-/navigation2_ws/install/setup.bash} &&
        sleep infinity"
    depends_on:
      navigation: { condition: service_started }

  foxglove:
    image: husarion/foxglove:1.84.0
    restart: unless-stopped
    ports:
      - 8080:8080
      - 8765:8765
    volumes:
      - ./config/layout.json:/foxglove/default-layout.json
    environment:
      - DS_TYPE=foxglove-websocket
      - DS_PORT=8765
      - DS_HOST=foxglove-ds
      - UI_PORT=8080
      - DISABLE_CACHE=true
      - DISABLE_INTERACTION=false

  foxglove-ds:
    image: husarion/foxglove-bridge:humble-0.7.3-20240108
    restart: unless-stopped
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml
        port:=8765
        capabilities:=[clientPublish,connectionGraph,assets]
    depends_on:
      rplidar:
        condition: service_started

  explore_lite:
    build:
      context: .
      dockerfile: Dockerfile.explore_lite
    network_mode: host
    restart: unless-stopped
    profiles: ["explore"]
    volumes:
      - ./config/explore_params.yaml:/opt/explore_ws/explore_params.yaml:ro
    depends_on:
      navigation:
        condition: service_healthy

