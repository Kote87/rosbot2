ekf_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    # Frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Fusión: usa la odometría de ruedas del controlador del base
    odom0: /rosbot_xl_base_controller/odom
    odom0_queue_size: 10
    odom0_differential: false
    # x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az
    odom0_config: [ true, true, false,
                    false, false, true,
                    true, true, false,
                    false, false, true,
                    false, false, false ]

    # De momento, sin IMU (añadirás después cuando verifiquemos el tópico exacto).
    # imu0: /imu/data
    # imu0_queue_size: 50
    # imu0_differential: false
    # imu0_remove_gravitational_acceleration: true
    # imu0_config: [ false, false, false,
    #                true,  true,  true,
    #                false, false, false,
    #                false, false, true,
    #                true,  true,  true ]

    use_sim_time: false
