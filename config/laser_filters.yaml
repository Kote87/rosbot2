scan_to_scan_filter_chain:
  ros__parameters:
    # Publica en /scan_filtered por defecto (el nodo usa el mismo frame que /scan)
    output_queue_size: 1

    # Cadena de filtros (puedes ajustar umbrales si tu chasis está más cerca/lejos)
    scan_filter_chain:
      - name: range
        type: laser_filters/LaserScanRangeFilter
        params:
          lower_threshold: 0.35          # antes 0.18–0.25; súbelo a 0.35 m
          upper_threshold: 20.0
          lower_replacement_value: inf
          upper_replacement_value: inf

      - name: shadows
        type: laser_filters/ScanShadowsFilter
        params:
          min_angle: 10.0                 # deg
          max_angle: 170.0                # deg
          neighbors: 1
          window: 1

      - name: median
        type: laser_filters/LaserScanMedianFilter
        params:
          window: 5                       # suaviza “salpicaduras” puntuales

      - name: box
        type: laser_filters/LaserScanBoxFilter
        params:
          box_frame: laser
          min_x: -0.25; max_x: 0.25       # “burbuja” que cubre chasis/soporte
          min_y: -0.22; max_y: 0.22
          min_z: -0.10; max_z: 0.40
