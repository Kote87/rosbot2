# docker-compose.override.yml
version: "3.5"

services:
  #################################################################
  # 1) Desactivar exploración autónoma (explore_lite/Nav2)
  #################################################################
  navigation:
    command: ["bash", "-c", "echo 'navigation disabled (teleop mapping)'; sleep infinity"]
    healthcheck:
      test: ["CMD", "true"]
  explore_lite:
    command: ["bash", "-c", "echo 'explore_lite disabled (teleop mapping)'; sleep infinity"]
    healthcheck:
      test: ["CMD", "true"]

  #################################################################
  # 2) Slam-Toolbox  (online_sync, construye /map)
  #################################################################
  slam_toolbox:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        ros2 launch slam_toolbox online_sync_launch.py
          slam_params_file:=/ros_ws/src/slam_toolbox/config/mapper_params_online_sync.yaml
          use_sim_time:=false"
    depends_on:
      - rosbot

  #################################################################
  # 3) Tele-op por teclado  (publica /cmd_vel)
  #################################################################
  teleop:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    tty: true
    stdin_open: true
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        ros2 run teleop_twist_keyboard teleop_twist_keyboard
          cmd_vel:=/cmd_vel"
    depends_on:
      - rosbot

