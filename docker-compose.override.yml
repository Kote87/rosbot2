version: "3.8"

services:
  ###############################################################
  # 1) rosbot: drivers SIN cámara OAK
  ###############################################################
  rosbot:
    command: >
      ros2 launch rosbot_xl_bringup bringup.launch.py
        mecanum:=${MECANUM:-True}
        enable_oak:=false

  ###############################################################
  # 2) teleop_twist_keyboard (mover el robot)
  ###############################################################
  teleop:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment: [ ROS_DOMAIN_ID=0 ]
    depends_on:
      rosbot: { condition: service_started }   # tolera que rosbot no tenga healthcheck
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 run teleop_twist_keyboard teleop_twist_keyboard
                 cmd_vel:=/cmd_vel"

  ###############################################################
  # 3) Navigation 2 (activo: genera /map)
  ###############################################################
  navigation:
    volumes:
      - ./maps:/home/husarion/rosbotxl/maps

  ###############################################################
  # 4) explore_lite dormido (evita exploración autónoma)
  ###############################################################
  explore_lite:
    command: [ "bash","-c","echo 'explore_lite disabled'; sleep infinity" ]

  ###############################################################
  # 5) Foxglove‑bridge con buffer / canales amplios
  ###############################################################
  foxglove-ds:
    image: husarion/foxglove-bridge:humble-0.7.3-20240108
    restart: unless-stopped
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml
        port:=8765
        capabilities:=[clientPublish,connectionGraph,assets]
    depends_on:
      rplidar:
        condition: service_started

  ###############################################################
  # 6) Foxglove Studio (UI) – sin cambios
  ###############################################################
  # foxglove  se queda tal y como está en tu compose.yaml

###############################################################
# 7) Static transform  (láser 20 cm detrás, 30 cm arriba)
###############################################################
  static_tf:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    restart: unless-stopped
    environment: [ ROS_DOMAIN_ID=0 ]
    command: [ "ros2", "run", "tf2_ros", "static_transform_publisher",
               "-0.20", "0.00", "0.30",        # x  y  z
               "-1.5708", "0", "1.5708",       # roll  pitch  yaw
               "laser", "oak_rgb_camera_optical_frame" ]

###############################################################
# 8) Overlay  (imagen OAK + puntos RPLIDAR)
###############################################################
  overlay:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    restart: unless-stopped
    environment: [ ROS_DOMAIN_ID=0 ]
    volumes:
      - ./scripts/lidar_overlay.py:/overlay.py:ro
    command: [ "bash", "-c",
               "apt-get update -qq && apt-get install -y python3-opencv && \
                python3 /overlay.py" ]
    depends_on:
      static_tf:
        condition: service_started

  ###############################################################
  # 9) Rectangular patrol  (auto_loop)
  ###############################################################
  auto_loop:
    image: husarion/navigation2:humble-1.1.12-20240123
    network_mode: host
    restart: unless-stopped
    depends_on:
      navigation: { condition: service_started }
    volumes:
      - ./rosbotxl/rosbotxl_auto:/opt/ws/src/rosbotxl_auto:ro
      - ./maps:/maps:ro
    command: >
      bash -c "
        # instalar colcon solo la primera vez (1-2 s)
        if ! command -v colcon &> /dev/null; then
          apt-get update -qq &&
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions && \
          rm -rf /var/lib/apt/lists/*
        fi &&
        source /opt/ros/humble/setup.bash &&
        cd /opt/ws &&
        colcon build --packages-select rosbotxl_auto &&
        source install/setup.bash &&
        ros2 launch rosbotxl_auto auto_loop.launch.py"
