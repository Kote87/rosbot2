services:
  rosbot:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  rplidar:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  navigation:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    # Activa el static publisher map→odom SOLO cuando NO uses SLAM.
    # Si vas a usar SLAM, deja este command comentado.
    #command: >
    #  bash -lc "source /opt/ros/humble/setup.bash &&
    #            ros2 run tf2_ros static_transform_publisher 0 0 0 0 0 0 map odom"

  microros:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  foxglove:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  foxglove-ds:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  path_tools:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  # Pequeño puente que GARANTIZA odom→base_link desde /odometry/filtered
  # hasta que comprobemos que el EKF lo publica estable por sí mismo.
  tf_bridge:
    network_mode: host
    image: ${ROS_IMAGE:-ros:humble-ros-base}
    depends_on:
      - rosbot
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    # Coloca el script en ./path_tools/tf_odom_bridge.py (te lo dejo abajo)
    volumes:
      - ./path_tools:/path_tools:ro
    command: >
      bash -lc "set -e;
                apt-get update;
                apt-get install -y --no-install-recommends \
                  ros-humble-tf2-ros ros-humble-nav-msgs python3-pip;
                source /opt/ros/humble/setup.bash;
                python3 /path_tools/tf_odom_bridge.py"

  # Teleop por teclado (vuelve a estar disponible para `just teleop`)
  teleop:
    network_mode: host
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    stdin_open: true
    tty: true
    depends_on:
      - rosbot
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                ros2 run teleop_twist_keyboard teleop_twist_keyboard cmd_vel:=/cmd_vel"
