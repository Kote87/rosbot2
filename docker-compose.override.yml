# docker-compose.override.yml   (solo lo que cambias)
version: "3.8"

services:
  # 1) Rosbot: arrancar drivers SIN cámara OAK
  rosbot:
    command: >
      ros2 launch rosbot_xl_bringup bringup.launch.py
        mecanum:=${MECANUM:-True}   # o False si es Omni
        enable_oak:=false           # ← DESACTIVA la cámara

  # 2) Tele‑op por teclado
  teleop:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment: [ ROS_DOMAIN_ID=0 ]
    depends_on:
      rosbot: { condition: service_healthy }
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 run teleop_twist_keyboard teleop_twist_keyboard
                 cmd_vel:=/cmd_vel"

  # 3) Foxglove bridge con más canales/buffer (opcional pero recomendado)
  foxglove-ds:
    image: husarion/foxglove-bridge:humble-0.8.7      # ≥0.8.6
    command: >
      foxglove_bridge
        --send-buffer-bytes 33554432
        --max-channels 256
        --ignore-unknown-types

  # 4) Congelar explore_lite (por si Husarion lo revive)
  explore_lite:
    command: ["bash","-c","echo 'explore_lite disabled'; sleep infinity"
