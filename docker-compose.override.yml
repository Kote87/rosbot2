services:
  rosbot:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  rplidar:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  navigation:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    # Activa el static publisher map→odom SOLO cuando NO uses SLAM.
    # Si vas a usar SLAM, deja este command comentado.
    #command: >
    #  bash -lc "source /opt/ros/humble/setup.bash &&
    #            ros2 run tf2_ros static_transform_publisher 0 0 0 0 0 0 map odom"

  microros:
    ports: []
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  foxglove:
    ports: []
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  foxglove-ds:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

  path_tools:
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp


  # Teleop por teclado (vuelve a estar disponible para `just teleop`)
  teleop:
    network_mode: host
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    stdin_open: true
    tty: true
    depends_on:
      - rosbot
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                ros2 run teleop_twist_keyboard teleop_twist_keyboard cmd_vel:=/cmd_vel"

  ekf:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    restart: unless-stopped
    depends_on:
      - rosbot
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - ./config/ekf.yaml:/config/ekf.yaml:ro
    command: >
      bash -lc "source /opt/ros/humble/setup.bash &&
                ros2 run robot_localization ekf_node
                --ros-args --params-file /config/ekf.yaml"
