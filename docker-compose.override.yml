version: "3.5"

services:
  # 1) Dormimos explore_lite / navigation cuando uses “just teleop”
  navigation:
    command: ["bash","-c","echo navigation dormido; sleep infinity"]

  # 2) Tele-op teclado
  teleop:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=0
    depends_on:
      rosbot:
        condition: service_healthy
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        ros2 run teleop_twist_keyboard teleop_twist_keyboard
          cmd_vel:=/cmd_vel"

  # 3) Aseguramos que el bridge existente foxglove-ds vea ROS 2
  foxglove-ds:
    environment:
      - ROS_DOMAIN_ID=0
    depends_on:
      rosbot:
        condition: service_healthy
