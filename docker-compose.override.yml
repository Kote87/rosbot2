version: "3.8"

services:
  ###############################################################
  # 1) rosbot: drivers SIN cámara OAK
  ###############################################################
  rosbot:
    command: >
      ros2 launch rosbot_xl_bringup bringup.launch.py
        mecanum:=${MECANUM:-True}
        enable_oak:=false

  ###############################################################
  # 2) teleop_twist_keyboard (mover el robot)
  ###############################################################
  teleop:
    image: husarion/rosbot-xl:humble-0.10.0-20240202
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment: [ ROS_DOMAIN_ID=0 ]
    depends_on:
      rosbot: { condition: service_started }   # tolera que rosbot no tenga healthcheck
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 run teleop_twist_keyboard teleop_twist_keyboard
                 cmd_vel:=/cmd_vel"

  ###############################################################
  # 3) Navigation 2 (activo: genera /map)
  ###############################################################
  # ‑‑ no lo tocamos: se mantiene igual que en compose.yaml
  #   (si quieres usar otros parámetros de SLAM, cámbialos ahí)

  ###############################################################
  # 4) explore_lite dormido (evita exploración autónoma)
  ###############################################################
  explore_lite:
    command: [ "bash","-c","echo 'explore_lite disabled'; sleep infinity" ]

  ###############################################################
  # 5) Foxglove‑bridge con buffer / canales amplios
  ###############################################################
  foxglove_bridge:
    image: ghcr.io/foxglove/ros-foxglove-bridge:0.8.6
    network_mode: bridge
    privileged: true
    environment: [ ROS_DOMAIN_ID=0 ]
    depends_on:
      rosbot:  { condition: service_started }
      rplidar: { condition: service_healthy }
    # sin 'ports:' (Caddy ya usa 8765)
    command: >
      foxglove_bridge
        --address 0.0.0.0
        --port 8765
        --send-buffer-bytes 67108864
        --max-channels 512
        --ignore-unknown-types

  ###############################################################
  # 6) Foxglove Studio (UI) – sin cambios
  ###############################################################
  # foxglove  se queda tal y como está en tu compose.yaml
